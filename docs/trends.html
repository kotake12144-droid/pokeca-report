  const charts = {};

  function fmtYen(v) {
    if (v == null) return '';
    return '¥' + v.toLocaleString('ja-JP');
  }

  function getCardData(name) {
    const dates = [];
    const mint = [];
    const psa10 = [];
    const diff = [];
    const aCount = [];
    const p10Count = [];

    for (const snap of HISTORY) {
      const card = snap.cards.find(c => c.name === name);
      dates.push(snap.date);
      if (card) {
        mint.push(card.mint != null ? card.mint : null);
        psa10.push(card.psa10 != null ? card.psa10 : null);
        diff.push(card.diff != null ? card.diff : null);
        aCount.push(card.a_count != null ? card.a_count : null);
        p10Count.push(card.psa10_count_all != null ? card.psa10_count_all : null);
      } else {
        mint.push(null);
        psa10.push(null);
        diff.push(null);
        aCount.push(null);
        p10Count.push(null);
      }
    }
    return { dates, mint, psa10, diff, aCount, p10Count };
  }

  function buildChart(id, config) {
    const ctx = document.getElementById(id).getContext('2d');
    if (charts[id]) charts[id].destroy();
    charts[id] = new Chart(ctx, config);
  }

  function yenTickFormatter(value) {
    return '¥' + value.toLocaleString('ja-JP');
  }

  function updateCharts(name) {
    const d = getCardData(name);

    buildChart('chartPrice', {
      type: 'line',
      data: {
        labels: d.dates,
        datasets: [
          {
            label: '美品',
            data: d.mint,
            borderColor: '#1a56db',
            backgroundColor: 'rgba(26,86,219,0.08)',
            tension: 0.3,
            spanGaps: true,
            pointRadius: 4,
          },
          {
            label: 'PSA10',
            data: d.psa10,
            borderColor: '#e3342f',
            backgroundColor: 'rgba(227,52,47,0.08)',
            tension: 0.3,
            spanGaps: true,
            pointRadius: 4,
          }
        ]
      },
      options: {
        responsive: true,
        plugins: { legend: { position: 'bottom' } },
        scales: {
          y: {
            ticks: { callback: yenTickFormatter },
          }
        }
      }
    });

    buildChart('chartDiff', {
      type: 'line',
      data: {
        labels: d.dates,
        datasets: [{
          label: '差額',
          data: d.diff,
          borderColor: '#38a169',
          backgroundColor: 'rgba(56,161,105,0.08)',
          tension: 0.3,
          spanGaps: true,
          pointRadius: 4,
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { position: 'bottom' } },
        scales: {
          y: {
            ticks: { callback: yenTickFormatter },
          }
        }
      }
    });

    buildChart('chartACount', {
      type: 'line',
      data: {
        labels: d.dates,
        datasets: [{
          label: 'A素体在庫（出品中）',
          data: d.aCount,
          borderColor: '#dd6b20',
          backgroundColor: 'rgba(221,107,32,0.08)',
          tension: 0.3,
          spanGaps: true,
          pointRadius: 4,
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { position: 'bottom' } },
      }
    });

    buildChart('chartP10Count', {
      type: 'line',
      data: {
        labels: d.dates,
        datasets: [{
          label: 'PSA10在庫（累計）',
          data: d.p10Count,
          borderColor: '#805ad5',
          backgroundColor: 'rgba(128,90,213,0.08)',
          tension: 0.3,
          spanGaps: true,
          pointRadius: 4,
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { position: 'bottom' } },
      }
    });
  }

  const sel = document.getElementById('cardSelect');
  if (sel.options.length > 0) {
    updateCharts(sel.value);
  }
  sel.addEventListener('change', () => updateCharts(sel.value));
  </script>
